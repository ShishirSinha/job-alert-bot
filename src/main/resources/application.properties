# ==========================================
# Application Configuration
# ==========================================
spring.application.name=job-alert-bot

# ==========================================
# Database Configuration (PostgreSQL)
# ==========================================
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.jpa.properties.hibernate.default_schema=job_alert_bot
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==========================================
# Email Configuration (Gmail SMTP Example)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# Custom Application Properties
# ==========================================
app.email.from=
app.email.to=

# ==========================================
# Job Search Criteria
# ==========================================

# Job titles to include
app.criteria.titles=

# Preferred locations
app.criteria.locations=

# Experience range (years)
app.criteria.min-experience=
app.criteria.max-experience=

# Required skills
app.criteria.required-skills=

# Excluded keywords
app.criteria.excluded-keywords=

# Minimum relevance score required to send notification
app.criteria.minimum-score=

# ==========================================
# Scheduler Configuration
# Cron format: second minute hour day month weekday
# Example below runs every day at 8:00 AM
# ==========================================
app.scheduler.cron=0 0 8 * * *

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.com.example.jobalertbot=INFO